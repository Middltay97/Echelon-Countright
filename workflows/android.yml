name: Build Android APK (Capacitor)

# Builds a signed Capacitor Android APK + AAB for ManageEngine MDM deployment.
# Outputs are uploaded as workflow artifacts on every run, and attached to a
# GitHub Release when you push a tag like `android-v1.0.1`.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of countright.keystore (`base64 -w0 countright.keystore`)
#   ANDROID_KEYSTORE_PASSWORD  -storepass used when creating the keystore
#   ANDROID_KEY_ALIAS          key alias (default: countright)
#   ANDROID_KEY_PASSWORD       -keypass used when creating the keystore

on:
  push:
    branches: [main]
    tags: ['android-v*']
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - 'capacitor-www/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Override versionCode (optional)'
        required: false
      version_name:
        description: 'Override versionName (optional)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install JS deps (for Capacitor CLI)
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Verify required secrets
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ] || [ -z "$KS_PASS" ] || [ -z "$KEY_PASS" ]; then
            echo "::error::Missing required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD"
            exit 1
          fi

      - name: Apply version overrides (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.version_code != '' || inputs.version_name != '') }}
        env:
          IN_VC: ${{ inputs.version_code }}
          IN_VN: ${{ inputs.version_name }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const f = 'android/app/build.gradle';
          let s = fs.readFileSync(f, 'utf8');
          if (process.env.IN_VC) s = s.replace(/versionCode\s+\d+/, `versionCode ${parseInt(process.env.IN_VC,10)}`);
          if (process.env.IN_VN) s = s.replace(/versionName\s+"[^"]*"/, `versionName "${process.env.IN_VN}"`);
          fs.writeFileSync(f, s);
          console.log('Patched version fields.');
          EOF

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 -d > android/app/countright.keystore
          ls -lh android/app/countright.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Gradle assembleRelease + bundleRelease
        working-directory: android
        env:
          CR_KEYSTORE_PATH: countright.keystore
          CR_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CR_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          CR_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon \
            -PCR_KEYSTORE_PATH="$CR_KEYSTORE_PATH" \
            -PCR_KEYSTORE_PASSWORD="$CR_KEYSTORE_PASSWORD" \
            -PCR_KEY_ALIAS="${CR_KEY_ALIAS:-countright}" \
            -PCR_KEY_PASSWORD="$CR_KEY_PASSWORD" \
            :app:assembleRelease :app:bundleRelease

      - name: Collect outputs
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/countright-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/countright-release.aab
          ls -lh dist/

      - name: Upload APK + AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: countright-apk
          path: |
            dist/countright-release.apk
            dist/countright-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/countright-release.apk
            dist/countright-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print SHA-256 cert fingerprint
        if: always()
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "::group::SHA-256 fingerprint (paste into src/routes/[.]well-known.assetlinks[.]json.ts)"
          keytool -list -v \
            -keystore android/app/countright.keystore \
            -alias "${KEY_ALIAS:-countright}" \
            -storepass "$KS_PASS" 2>/dev/null | grep -E "SHA256:" || true
          echo "::endgroup::"
